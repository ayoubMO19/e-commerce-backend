<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de Verificación — VEXA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .card { max-width: 400px; padding: 40px; }
        .icon { width: 80px; height: 80px; background: #fff1f2; color: #ef4444; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 40px; }
        h1 { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: #71717a; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; background: black; color: white; padding: 18px 30px; border-radius: 15px; text-decoration: none; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✕</div>
    <h1>Enlace inválido</h1>
    <p th:text="${errorMessage}">Hubo un problema al verificar tu cuenta.</p>
    <a href="https://e-commerce-frontend-mu-five.vercel.app/login" class="btn">Volver al inicio</a>
</div>
</body>
</html>
