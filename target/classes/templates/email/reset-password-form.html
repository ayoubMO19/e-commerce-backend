<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — VEXA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --gray-400: #a1a1aa;
            --gray-100: #f4f4f5;
            --gray-200: #e4e4e7;
            --bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            background: black;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-weight: 900;
            font-size: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            /* Transformación inclinada eliminada */
            transform: none;
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-400);
            margin-left: 4px;
        }

        /* Contenedor relativo para el input y el ojo */
        .input-wrapper {
            position: relative;
            margin-top: 8px;
        }

        input {
            width: 100%;
            padding: 18px;
            padding-right: 50px; /* Espacio para el icono */
            border: 1px solid #f0f0f0;
            border-radius: 20px;
            background: var(--gray-100);
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: black;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
        }

        /* Estilos para el botón del ojito */
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-400);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            /* Reset de estilos de botón global */
            width: auto;
            box-shadow: none;
            margin-top: 0;
        }

        .toggle-password:hover {
            color: black;
            background: none;
            transform: translateY(-50%); /* Evita el salto del hover global */
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        /* Estado 'oculto' del ojo (cuando se ve la pass) */
        .toggle-password .eye-off {
            display: none;
        }

        .toggle-password.active .eye-on {
            display: none;
        }

        .toggle-password.active .eye-off {
            display: block;
        }

        /* Botón de envío */
        button[type="submit"] {
            width: 100%;
            padding: 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        button[type="submit"]:hover {
            background: #222;
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ef4444;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
            margin-left: 4px;
            display: none;
        }

        .success-box {
            display: none;
            background: white;
            padding: 20px;
            animation: scaleUp 0.5s ease;
        }

        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            color: #22c55e;
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="formContent">
        <div class="logo-box">V</div>
        <h1>Nueva Clave</h1>
        <p class="subtitle">Actualiza tu acceso seguro</p>

        <form id="resetForm">
            <div class="form-group">
                <label>Contraseña Nueva</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
                    <button type="button" class="toggle-password" data-target="newPassword" aria-label="Mostrar contraseña">
                        <svg class="eye-on" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
                <div class="error-msg" id="passwordError">Mínimo 6 caracteres</div>
            </div>

            <div class="form-group">
                <label>Repetir Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Mostrar contraseña">
                        <svg class="eye-on" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
                <div class="error-msg" id="confirmError">Las contraseñas no coinciden</div>
            </div>

            <input type="hidden" id="token" th:value="${token}">
            <input type="hidden" id="frontendUrl" th:value="${frontendUrl}">

            <button type="submit" id="submitBtn">Actualizar contraseña</button>
        </form>
    </div>

    <div class="success-box" id="successMessage">
        <div class="success-icon">✓</div>
        <h2 style="font-size: 24px; font-weight: 900; text-transform: uppercase;">Actualizada</h2>
        <p style="font-size: 13px; color: #71717a; margin-top: 8px;">
            Tu contraseña ha sido cambiada con éxito. <br>
            Redirigiendo al inicio de sesión...
        </p>
    </div>
</div>

<script>
    // Lógica para mostrar/ocultar contraseña
    const toggleButtons = document.querySelectorAll('.toggle-password');

    toggleButtons.forEach(button => {
        button.addEventListener('click', function() {
            // Pillamos el input target desde el atributo data-target
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);

            // Cambiamos el tipo de input
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.add('active'); // Muestra ojo tachado
                this.setAttribute('aria-label', 'Ocultar contraseña');
            } else {
                input.type = 'password';
                this.classList.remove('active'); // Muestra ojo abierto
                this.setAttribute('aria-label', 'Mostrar contraseña');
            }
        });
    });

    // Lógica de envío del formulario (Mantenida igual)
    const resetForm = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');
    const passwordError = document.getElementById('passwordError');
    const confirmError = document.getElementById('confirmError');

    resetForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const token = document.getElementById('token').value;
        const frontendUrl = document.getElementById('frontendUrl').value;

        passwordError.style.display = 'none';
        confirmError.style.display = 'none';

        if (newPassword.length < 6) {
            passwordError.style.display = 'block';
            return;
        }
        if (newPassword !== confirmPassword) {
            confirmError.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = 'PROCESANDO...';

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            if (response.ok) {
                document.getElementById('formContent').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';

                setTimeout(() => {
                    window.location.href = (frontendUrl || '') + '/login';
                }, 3000);
            } else {
                alert('Error: El enlace puede haber expirado o es inválido.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'ACTUALIZAR CONTRASEÑA';
            }
        } catch (error) {
            alert('Error de conexión con el servidor.');
            submitBtn.disabled = false;
            submitBtn.innerText = 'ACTUALIZAR CONTRASEÑA';
        }
    });
</script>
</body>
</html>
