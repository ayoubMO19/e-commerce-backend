<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica', Arial, sans-serif; background-color: #ffffff; color: #000000;">
<table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 600px; margin: auto; padding: 40px 20px;">
    <tr>
        <td align="center" style="padding-bottom: 40px;">
            <div style="background-color: #000000; color: #ffffff; width: 50px; height: 50px; line-height: 50px; border-radius: 15px; font-weight: bold; font-size: 20px; text-align: center;">V</div>
            <h1 style="text-transform: uppercase; letter-spacing: 4px; font-size: 24px; margin-top: 20px;">VEXA ACCESS</h1>
        </td>
    </tr>
    <tr>
        <td style="background-color: #f9f9f9; padding: 40px; border-radius: 30px; text-align: center;">
            <h2 style="font-size: 20px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px;">Restablecer contraseña</h2>
            <p style="font-size: 14px; color: #666666; line-height: 1.6; margin-bottom: 30px;">
                Has solicitado cambiar tu contraseña de acceso a VEXA. Haz clic en el botón de abajo para continuar.
            </p>

            <a th:href="${resetUrl}"
               style="display: inline-block; background-color: #000000; color: #ffffff; padding: 18px 32px; border-radius: 15px; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
                Cambiar Contraseña
            </a>

            <p style="margin-top: 40px; font-size: 11px; color: #999999; text-transform: uppercase; letter-spacing: 1px;">
                El enlace expira en 60 minutos
            </p>
        </td>
    </tr>
    <tr>
        <td align="center" style="padding-top: 40px;">
            <p style="font-size: 12px; color: #cccccc;">Si no solicitaste este cambio, puedes ignorar este correo de forma segura.</p>
            <p style="font-size: 10px; color: #000000; font-weight: bold; letter-spacing: 2px; margin-top: 20px;">VEXA E-COMMERCE</p>
        </td>
    </tr>
</table>
</body>
</html>
