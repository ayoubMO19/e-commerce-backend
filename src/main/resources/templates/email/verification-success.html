<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Verificada — VEXA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            max-width: 400px;
            padding: 40px;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #f0fff4;
            color: #22c55e;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
        }
        h1 { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; margin-bottom: 10px; }
        p { color: #71717a; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }

        .btn {
            display: inline-block;
            background: black;
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<input type="hidden" id="frontendUrl" th:value="${frontendUrl}">
<div class="card">
    <div class="icon-circle">✓</div>
    <h1>Cuenta Activa</h1>
    <p>Tu correo ha sido verificado con éxito. Ya puedes acceder a todas las funciones de VEXA.</p>
    <a href="#" id="loginLink" class="btn">Ir al inicio de sesión</a>
</div>

<script>
    const baseUrl = document.getElementById('frontendUrl').value;
    const link = document.getElementById('loginLink');
    link.href = (baseUrl || '') + '/login';

    // Redirección automática a los 5 segundos
    setTimeout(() => {
        window.location.href = link.href;
    }, 5000);
</script>
</body>
</html>
