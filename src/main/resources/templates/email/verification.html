<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica', Arial, sans-serif; background-color: #ffffff; color: #000000;">
<table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 600px; margin: auto; padding: 40px 20px;">
    <tr>
        <td align="center" style="padding-bottom: 40px;">
            <div style="background-color: #000000; color: #ffffff; width: 56px; height: 56px; line-height: 56px; border-radius: 18px; font-weight: bold; font-size: 24px; text-align: center;">V</div>
            <h1 style="text-transform: uppercase; letter-spacing: 5px; font-size: 20px; margin-top: 24px; font-weight: 900;">Bienvenido a VEXA</h1>
        </td>
    </tr>
    <tr>
        <td style="background-color: #f8f8f8; padding: 50px 40px; border-radius: 32px; text-align: center;">
            <h2 style="font-size: 22px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; letter-spacing: -0.5px;">Confirma tu registro</h2>
            <p style="font-size: 15px; color: #666666; line-height: 1.6; margin-bottom: 35px;">
                Gracias por unirte. Estamos listos para comenzar, solo necesitamos confirmar que este es tu correo electrónico.
            </p>

            <a th:href="${verificationUrl}"
               style="display: inline-block; background-color: #000000; color: #ffffff; padding: 20px 40px; border-radius: 18px; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                Verificar mi cuenta
            </a>

            <p style="margin-top: 40px; font-size: 10px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 1px;">
                Este enlace será válido durante 24 horas
            </p>
        </td>
    </tr>
    <tr>
        <td align="center" style="padding-top: 40px;">
            <p style="font-size: 11px; color: #bbbbbb; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold;">VEXA E-COMMERCE SYSTEM</p>
        </td>
    </tr>
</table>
</body>
</html>
